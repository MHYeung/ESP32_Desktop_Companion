<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet" />
    <title>Desktop Companion Web Flasher</title>
  </head>
  <body>
    <main>
      <section class="hero">
        <p class="eyebrow">ESP32 Desktop Companion</p>
        <h1>Flash firmware, Wi-Fi, and your own photos in one flow.</h1>
        <p id="support">Select a board, add photos, set Wi-Fi and Pomodoro defaults, then flash over USB.</p>
      </section>

      <section class="grid">
        <label>Board<select id="board"></select></label>
        <label>Wi-Fi SSID<input id="ssid" autocomplete="off" maxlength="32" /></label>
        <label>Wi-Fi Password<input id="password" type="password" maxlength="64" /></label>
        <label>Timezone
          <select id="timezone">
            <option value="CST-8" selected>Taiwan / Taipei (UTC+8)</option>
            <option value="JST-9">Japan / Korea (UTC+9)</option>
            <option value="UTC0">UTC</option>
            <option value="PST8PDT,M3.2.0,M11.1.0">US Pacific</option>
            <option value="EST5EDT,M3.2.0,M11.1.0">US Eastern</option>
          </select>
        </label>
        <label>Photo rotation seconds<input id="rotation" type="number" min="10" value="60" /></label>
        <label>Pomodoro duration seconds<input id="pomodoro" type="number" min="300" max="5940" step="300" value="1500" /></label>
      </section>

      <section>
        <label class="upload">Photos<input id="photos" type="file" accept="image/*" multiple /></label>
        <p id="usage"></p>
        <div id="previews" class="previews"></div>
      </section>

      <section class="actions">
        <button id="flash">Generate and Flash</button>
        <span id="progress">0%</span>
      </section>

      <pre id="log"></pre>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
