name: Web Flasher

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  firmware:
    name: Firmware (${{ matrix.target }})
    runs-on: ubuntu-latest
    container: espressif/idf:release-v5.3
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: esp32s3
            artifact: esp32s3
          - target: esp32c3
            artifact: esp32c3
          - target: esp32c6
            artifact: esp32c6
    steps:
      - uses: actions/checkout@v4
      - name: Build firmware
        shell: bash
        env:
          TARGET_ARTIFACT: ${{ matrix.artifact }}
        run: |
          . /opt/esp/idf/export.sh
          idf.py set-target ${{ matrix.target }}
          idf.py build
          python - <<'PY'
          import json
          import os
          import pathlib
          import shutil

          target = os.environ["TARGET_ARTIFACT"]
          out_dir = pathlib.Path("firmware") / target
          out_dir.mkdir(parents=True, exist_ok=True)

          args = json.loads(pathlib.Path("build/flasher_args.json").read_text())
          write_args = args.get("write_flash_args", [])
          flash_files = args.get("flash_files", {})

          def arg_value(flag, default):
              if flag in write_args:
                  index = write_args.index(flag)
                  if index + 1 < len(write_args):
                      return write_args[index + 1]
              return default

          parts = []
          for offset_text, rel_path in sorted(flash_files.items(), key=lambda item: int(item[0], 0)):
              src = pathlib.Path("build") / rel_path
              dst_name = pathlib.Path(rel_path).name
              dst = out_dir / dst_name
              shutil.copyfile(src, dst)
              data = dst.read_bytes()
              parts.append({
                  "name": pathlib.Path(dst_name).stem,
                  "path": f"./firmware/{target}/{dst_name}",
                  "offset": int(offset_text, 0),
                  "espImage": bool(data and data[0] == 0xE9),
              })

          manifest = {
              "flashMode": arg_value("--flash_mode", "dio"),
              "flashFreq": arg_value("--flash_freq", "40m"),
              "flashSize": arg_value("--flash_size", "4MB"),
              "parts": parts,
          }
          (out_dir / "manifest.json").write_text(json.dumps(manifest, indent=2))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.artifact }}
          path: firmware/${{ matrix.artifact }}

  pages:
    name: Build and Deploy Pages
    runs-on: ubuntu-latest
    needs: firmware
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: actions/download-artifact@v4
        with:
          pattern: firmware-*
          path: web/public/firmware
      - name: Normalize firmware folders
        shell: bash
        run: |
          for dir in web/public/firmware/firmware-*; do
            mv "$dir" "web/public/firmware/${dir##*-}"
          done
      - name: Build web flasher
        working-directory: web
        run: |
          npm ci
          npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist
      - uses: actions/deploy-pages@v4
        id: deployment
